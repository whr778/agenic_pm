<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PM MVP Scaffold</title>
    <style>
      :root {
        --accent-yellow: #ecad0a;
        --primary-blue: #209dd7;
        --secondary-purple: #753991;
        --navy-dark: #032147;
        --gray-text: #888888;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(150deg, #f4fbff 0%, #f7f4fb 100%);
        color: var(--navy-dark);
      }
      main {
        max-width: 760px;
        margin: 4rem auto;
        background: #ffffff;
        border: 1px solid #dfe8ef;
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 20px 40px rgba(3, 33, 71, 0.08);
      }
      h1 {
        margin: 0;
        color: var(--navy-dark);
      }
      p {
        color: var(--gray-text);
      }
      .chip {
        display: inline-block;
        margin-top: 0.5rem;
        padding: 0.35rem 0.65rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        background: #f4f9fc;
        border: 1px solid #dfe8ef;
      }
      .ok {
        color: #0a8a4b;
      }
      .bad {
        color: #a33636;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello from PM MVP scaffold</h1>
      <p>FastAPI is serving this static page. The status below comes from an API call.</p>
      <div class="chip" id="status">Calling /api/hello...</div>
    </main>

    <script>
      const statusEl = document.getElementById("status");

      fetch("/api/hello")
        .then((response) => response.json())
        .then((data) => {
          const configured = data.openrouterConfigured ? "yes" : "no";
          statusEl.textContent = `API ok: ${data.message} | OPENROUTER_API_KEY loaded: ${configured}`;
          statusEl.classList.add("ok");
        })
        .catch(() => {
          statusEl.textContent = "API call failed";
          statusEl.classList.add("bad");
        });
    </script>
  </body>
</html>
